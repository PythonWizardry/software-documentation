{% extends "base.html" %}

{% block title %}Sign in{% endblock %}

{% block content %}
<div class="card" style="max-width: 520px; margin: 0 auto;">
    <div class="header" style="align-items: flex-start;">
        <div>
            <h1 class="title" style="margin-bottom: 6px;">Sign in required</h1>
            <p class="subtitle">Use Google login to access the lab.</p>
        </div>
    </div>

    <p class="meta" id="auth-status" style="margin-top: 0;">You are not signed in.</p>
    <div class="actions">
        <button class="btn btn-primary" id="google-login">Sign in with Google</button>
    </div>
    <p class="error" id="auth-error" style="display: none; margin-top: 12px;"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script>
    const firebaseConfig = {{ firebase_config | tojson }};
    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();
    const errorBox = document.getElementById("auth-error");

    function showError(message) {
        errorBox.textContent = message;
        errorBox.style.display = "block";
    }

    document.getElementById("google-login").addEventListener("click", async () => {
        errorBox.style.display = "none";
        try {
            const result = await auth.signInWithPopup(provider);
            const idToken = await result.user.getIdToken();

            const response = await fetch("/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ idToken }),
            });

            if (!response.ok) {
                const payload = await response.json().catch(() => ({}));
                throw new Error(payload.detail || "Login failed");
            }

            const payload = await response.json();
            window.location.href = payload.next || "/applications";
        } catch (error) {
            showError(error.message || "Login failed");
        }
    });
</script>
{% endblock %}
