<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Google Play MVC{% endblock %}</title>
    <style>
        :root {
            --bg: #f4f7fb;
            --surface: #ffffff;
            --text: #1a2433;
            --muted: #586575;
            --accent: #1475d1;
            --danger: #bb2d3b;
            --border: #d9e2ec;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 55%);
            color: var(--text);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 6px 20px rgba(0, 20, 60, 0.06);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .title {
            margin: 0;
            font-size: 28px;
        }

        .subtitle {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .btn {
            border: 0;
            border-radius: 10px;
            padding: 9px 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary { background: var(--accent); color: white; }
        .btn-secondary { background: #eaf2fb; color: #0f3a64; }
        .btn-danger { background: var(--danger); color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
        }

        th, td {
            text-align: left;
            border-bottom: 1px solid var(--border);
            padding: 10px 8px;
            vertical-align: top;
        }

        th {
            font-size: 13px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            color: var(--muted);
        }

        input, select {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 11px;
            font-size: 14px;
            width: 100%;
            background: white;
        }

        .error {
            margin: 0 0 14px;
            background: #fdebed;
            border: 1px solid #f4c2c7;
            color: #841b26;
            border-radius: 10px;
            padding: 10px;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .meta {
            color: var(--muted);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
